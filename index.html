<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cargora - Cargas disponíveis</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}

h1{
color:#333;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.valor{
font-size:20px;
font-weight:bold;
color:#0a7cff;
}

.rota{
font-size:18px;
margin-bottom:10px;
}

.status{
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<h1>🚛 Cargas disponíveis</h1>

<div id="cargas"></div>

<script>

async function carregarCargas(){

const resposta = await fetch("https://cargora-backend.onrender.com/cargas");
const dados = await resposta.json();

const container = document.getElementById("cargas");

dados.forEach(carga => {

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<div class="rota">
${carga.origem_estado} - ${carga.origem_cidade}
→
${carga.destino_estado} - ${carga.destino_cidade}
</div>

<div class="valor">
R$ ${carga.valor}
</div>

<div class="status">
Status: ${carga.status}
</div>
`;

container.appendChild(div);

});

}

carregarCargas();

</script>

</body>
</html>
